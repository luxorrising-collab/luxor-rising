contrastEyebrow: Why most people leave Egypt disappointed
contrastTitle: You came for the wonder. Not for a queue.
contrastLead: >-
  Most visitors meet Luxor through a packed coach, twenty rushed minutes
  per temple, the midday heat, and a guide they share with forty
  strangers. The real Egypt — the quiet, the colour, the awe — passes
  them by. It doesn't have to be your story.
badWayItems:
  - A coach with 40 strangers, on someone else's clock
  - Temples at midday, shoulder to shoulder
  - Hours lost to planning, booking, haggling
  - A generic script, rushed and impersonal
  - You hope it's good. You find out on the day.
goodWayItems:
  - Private — just you and up to three guests
  - Karnak at dawn, before the crowds arrive
  - Every detail arranged; you make no decisions
  - Your own licensed Egyptologist, the story unfolded for you
  - A consigliere on call all day, and a promise it's right
dreamText: >-
  You wake before the heat. A private car is already waiting. At Karnak,
  the great hall is almost empty — your Egyptologist unfolds three
  thousand years as the first light moves between the columns. Lunch is
  handled. By late afternoon the Nile is yours alone, a felucca tilting
  into the gold. You took no decisions, stood in no queue, missed
  nothing. You simply arrived — and Egypt did the rest.
