scarcityBadge: Why we keep it small
scarcityTitle: A handful of private days each week. No more.
scarcityText: >-
  Every guest gets a real consigliere and a licensed local team for the
  day — so we cap how many days we take. It keeps the experience
  flawless, and it means popular dates go early. If your date matters,
  claim it now.
faq:
  - question: Is this really worth it over a cheap group tour?
    answer: >-
      A group tour saves a little money and costs you the experience —
      crowds, rushing, and a day you don't control. We give you the
      temples before the crowds, your own expert, and zero decisions.
      Most guests tell us it was the best day of their trip. That's what
      you're paying for.
  - question: Are you a travel agency?
    answer: >-
      No. We're your private concierge and advisor. We arrange and
      coordinate your day; the experiences, guiding and transfers are
      delivered by our licensed local partners. Each day is a single day
      with no overnight.
  - question: Can I pay part on the day?
    answer: >-
      Yes. Pay in full online, or place a deposit now to lock your date
      and settle the rest on the day with your concierge.
  - question: What if my plans change?
    answer: >-
      Cancel up to 7 days before for a full refund, no questions asked.
      Closer to the day, talk to your consigliere — we'll do everything
      we can to move it.
  - question: Who actually guides and drives?
    answer: >-
      Licensed local specialists — a licensed Egyptologist for the
      monuments, vetted drivers and hosts. We select, brief and
      coordinate them, and stay reachable all day.
  - question: What if I want more than one day?
    answer: >-
      Add days in the configurator — the per-day price drops and extra
      signatures and bonuses unlock (Medinet Habu, a private photoshoot,
      a welcome gift and more). Each day stays a single day; we never
      bundle an overnight.
finalEyebrow: Your date is waiting
finalTitle: Give us one day. We'll give you the one you remember.
finalText: >-
  Private, effortless, and guaranteed — from €450. Pick your date before
  it's taken.
