howItWorksEyebrow: How it works
howItWorksTitle: You design it. We arrange everything.
howItWorksSteps:
  - title: You design your day
    description: Pick your date and preferences in a minute on our day page.
  - title: We arrange every detail
    description: >-
      Entries, transfers, your own licensed Egyptologist, the Nile or the
      desert — all booked for you.
  - title: You simply arrive
    description: >-
      Your consigliere is reachable all day. You experience Egypt; we
      handle the rest.
disclosureText: >-
  Luxor Rising is your private concierge & advisor. We arrange and
  coordinate; experiences, guiding and transfers are delivered by our
  licensed local partners. Each concierge day is a single day with no
  overnight stay.
whyEyebrow: Why Luxor Rising
whyTitle: The difference is everything you don't have to do
whyItems:
  - icon: ✦
    title: Truly private
    description: Just you and up to three guests — never a coach of strangers.
  - icon: ❖
    title: Insider access
    description: >-
      The right places at the right hour, and a few almost nobody sees.
  - icon: ◆
    title: Licensed locals
    description: >-
      Your own licensed Egyptologist and vetted local hosts deliver every
      moment.
  - icon: ✧
    title: Effortless
    description: 'No planning, no queues, no decisions — and a promise it''s right.'
