howItWorksTitle: You design it. We arrange everything.
howItWorksSteps:
  - title: You design your day
    description: Pick your date and preferences in a minute on our day page.
  - title: We arrange every detail
    description: >-
      Entries, transfers, your own licensed Egyptologist, the Nile or the
