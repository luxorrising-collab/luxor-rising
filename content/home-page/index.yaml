positioningEyebrow: The promise
positioningTitle: |-
  You won't follow a schedule.
  You'll follow the light.
positioningLead: >-
  Most of Egypt is sold by the busload — three temples before lunch, a
  boat shared with eighty strangers. We do the opposite: one experience
  at a time, paced to the hour the light is most beautiful, with every
  detail arranged so you never lift a finger.
