heroEyebrow: Book your own trusted local
heroTitle: |-
  Not a travel agency.
  Your own person in Egypt.
heroLead: >-
  A licensed Egyptologist to read three thousand years for you, and a
  consigliere who plans the days, handles the logistics, translates, and
  opens the doors most visitors never find.
heroCtaLabel: Request your host →
heroImage: /images/private-guide/hero.jpg
trustItems:
  - A person, not a call centre
  - Certified Egyptologist on site
  - On WhatsApp before & during
  - 60+ private days arranged
consigliereEyebrow: The person at the heart of it
consigliereTitle: What is a Luxor Rising consigliere?
consigliereLead: >-
  Not a guide with a flag and a script. A consigliere is one trusted person who
  understands where you are in your own journey, shares the road with you, and
  quietly arranges every last detail — the car, the tickets, the right hour, the
  doors — so all you have to do is be present. You manage nothing. You just flow.
consiglierePoints:
  - title: A guide who understands your journey
    description: >-
      Someone who listens first — who grasps what this trip really means to you —
      and then reads three thousand years in a way that speaks to it. Never a
      memorised tour repeated to everyone.
  - title: A companion who shares the road
    description: >-
      A real person who knows your name, is on WhatsApp before you arrive and
      beside you through every day. Someone — never a call centre or a voucher.
  - title: Everything arranged, so you just flow
    description: >-
      Cars, tickets, timing, translation, the quiet hour ahead of the crowds, and
      the doors that never open for a coach — all handled invisibly. You never
      touch a single logistic.
momentQuote: >-
  Anyone can buy a ticket to Egypt. Very few ever get to be shown it.
momentImage: /images/private-guide/moment.jpg
contrastEyebrow: The difference is who you're actually dealing with
contrastTitle: Most "private tours" are a booking and a stranger. This is the opposite.
contrastLead: >-
  Most "private tours" are a booking on a platform and a stranger who
  turns up. This is the opposite.
agencyTitle: A tour company
agencyItems:
  - A form, a voucher, and whoever's free that day
  - A script, repeated to everyone
  - No one to call when plans change
  - You're a booking reference
  - The same sites, the same order, the same photos
hostTitle: Your own local host
hostItems:
  - One person who knows your name and your trip
  - A licensed Egyptologist who tells you what you care about
  - A consigliere on WhatsApp, before you arrive and all day
  - Doors that don't open for a coach — hosts, artisans, kitchens
  - Your days, built around you, in your order
hostsEyebrow: The people on your side
hostsTitle: One name to call — and a whole city behind it
hostsLead: >-
  A consigliere is never alone. Behind your single point of contact stands a
  network Luxor has trusted for generations.
hosts:
  - image: /images/hosts/ahmed-2.jpg
    name: Ahmed
    role: Head of Egyptian operations
    bio: >-
      Born twenty minutes from the Valley gate, twenty years opening doors in
      this city — for archaeologists, film crews, and travellers who simply
      wanted to see it properly. He doesn't carry a flag; he decides the shape
      of your day and makes sure every promise is kept on the ground.
  - image: /images/hosts/dr-nour.jpg
    name: The temple guards
    role: Keepers of the mysteries, on your side
    bio: >-
      The men whose families have watched over these temples and tombs for
      generations — who know which chamber the light reaches first, which gate
      opens before the crowds, and the quiet corners no guidebook lists. Once
      they guarded the mysteries. Now they open them for you.
  - image: /images/hosts/temple-guards.jpg
    name: A certified Egyptologist, on site
    role: Licensed to make the walls speak
    bio: >-
      Guiding inside Egypt's monuments is, by law, reserved for licensed
      Egyptian Egyptologists — so one is always on site with you, turning
      carvings and cartouches into the story you'll remember. The scholar who
      makes three thousand years legible.
formEyebrow: Request your host
formTitle: Tell us about your trip
formLead: >-
  A few details is all we need. Your consigliere reads it personally and
  comes back within 24 hours with who'd host you and what a day could
  look like — no obligation, no automated quote.
formNote: >-
  We reply within 24 hours. No spam, no selling your details. By sending
  you agree to our privacy policy.
closerEyebrow: Ready when you are
closerTitle: Book the person, not the package.
closerText: >-
  Tell us about your trip and we'll introduce your host — or build your
  day and see the price first. Either way, you're dealing with a real
  person in Egypt.
metaTitle: Your Own Private Tour Guide in Egypt — Book a Trusted Local
metaDescription: >-
  Not a travel agency — your own trusted local in Egypt. A licensed
  Egyptologist and a consigliere who plans your days, drives you,
  translates, and shows you the Egypt behind the ticket booth.
