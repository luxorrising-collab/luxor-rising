stepsEyebrow: How it works
stepsTitle: Tell us the vibe. We'll match the place.
steps:
  - title: Tell us what you're after
    description: >-
      Your dates, how many of you, sea or river, and the feeling you're looking
      for. A sentence is enough to start.
  - title: We send you two or three
    description: >-
      Not a search page — a short, honest shortlist with real photographs, real
      rates, and what each place is genuinely like to stay in.
  - title: Meet your host, move in
    description: >-
      We introduce you to the host and agree the terms directly. Your
      consigliere stays on hand for anything you need while you're here.
formEyebrow: Request availability
formTitle: Tell us where and when
formLead: >-
  Send us your dates and the kind of place you're imagining. We come back
  within 24 hours with what's free, what it costs, and honest notes on each
  one — no obligation, no automated quote.
formNote: >-
  We reply within 24 hours. No spam, no selling your details. By sending you
  agree to our privacy policy.
closerEyebrow: Ready when you are
closerTitle: Come for a week. Stay for the season.
closerText: >-
  Tell us your dates and the feeling you're after, and we'll show you the
  places we'd stay in ourselves — with the host's name attached.
metaTitle: Private Villas & Apartments in Luxor and Hurghada — Hand-Picked
metaDescription: >-
  Hand-picked private villas and apartments in Luxor and Hurghada. Huge
