heroEyebrow: Private villas & apartments
heroTitle: |-
  Stay somewhere
  you won't find online.
heroLead: >-
  Hand-picked private villas and apartments in Luxor and on the Red Sea —
  chosen by vibe, kept by hosts we know personally. Huge private terraces,
  views worth waking up for, and internet fast enough to stay a season.
heroCtaLabel: Request availability →
heroImage: /images/villas/hero.jpg
trustItems:
  - Hand-picked, never listed in bulk
  - Verified local hosts
  - Fast, tested Wi-Fi
  - Long stays welcome
introEyebrow: How we choose
introTitle: We pick by vibe, not by star rating.
introLead: >-
  Every place here has been walked through, sat in at sunrise and checked
  again after dark. We don't offer anything we wouldn't stay in ourselves —
  no flattering angles, no surprises at the door. If somewhere doesn't have
  a view worth waking up for, it doesn't make the list.
vibePoints:
  - title: A view worth waking up for
    description: >-
      The sea at sunrise, the desert at sunset, the Valley of the Kings across
      the water. The view is the first thing we judge and the last thing we
      compromise on.
  - title: Space to actually live
    description: >-
      Huge private terraces with room to roll out a mat, lift, skip, stretch or
      simply eat outside. Modern European interiors, proper kitchens, and beds
      you'll actually sleep in.
  - title: A host you can call
    description: >-
      Every property is kept by a local host we know by name and have met in
      person. One message and something gets fixed — no call centre, no lockbox
      roulette.
placesEyebrow: Two places
placesTitle: The Red Sea, or the river.
places:
  - eyebrow: Hurghada · The Red Sea
    title: Sunrise over the sea. Sunset over the desert.
    description: >-
      On the coast you get both horizons in a single day — the sun coming up
      out of the Red Sea from your own terrace, and dropping behind the desert
      mountains at your back. The apartments here are bright, modern and built
      for the outdoors, with terraces big enough to become the main room.
    image: /images/villas/hurghada-sea-dawn.jpg
    points:
      - Sunrise over the Red Sea from your own terrace
      - Sunset over the desert mountains behind you
      - Terraces sized for yoga, training or skipping rope
      - Minutes from the water, and quiet at night
  - eyebrow: Luxor · The Nile
    title: The Valley of the Kings, from your own roof.
    description: >-
      In Luxor the terrace looks out over the Nile and, beyond it, the Theban
      hills that hide the Valley of the Kings. Balloons drift across them at
      first light. It is the view people fly across the world to see for an
      hour — and here it comes with your morning coffee, every day.
    image: /images/villas/luxor-nile-terrace.jpg
    points:
      - The Nile and the Theban hills in one view
      - Balloons over the Valley of the Kings at dawn
      - Huge private roof terraces
      - Walk to the river, temples a short drive away
featuresEyebrow: What every place has
featuresTitle: Comfort you can live and work in.
features:
  - icon: ◴
    title: Views first
    description: >-
      Sea, desert, Nile or the Theban hills — every place on this list earns it
      on the view.
  - icon: ❖
    title: Huge private terraces
    description: >-
      Room for a yoga mat, weights, a skipping rope, a long table — or for
      nobody at all.
  - icon: ✦
    title: Modern European interiors
    description: >-
      Clean, contemporary rooms and proper kitchens. Familiar comfort, not a
      hotel corridor.
  - icon: ⌁
    title: Internet you can rely on
    description: >-
      Connections we've tested ourselves — fast enough to work, call and upload
      all day.
  - icon: ◈
    title: Built for longer stays
    description: >-
      Weekly and monthly rates, laundry, a real kitchen, and space that doesn't
      close in on you.
  - icon: ◆
    title: Verified local hosts
    description: >-
      Someone nearby who answers, knows the building, and fixes things the same
      day.
retreatEyebrow: A retreat, not a rental
retreatTitle: Somewhere to slow all the way down.
retreatLead: >-
  Most people arrive for a week and start asking about a month. Wake with the
  light, train on the terrace, work through the heat of the day, and watch the
  sun go down behind the mountains. When you want the temples, the desert or
  the water, your consigliere arranges it around you.
retreatImage: /images/villas/retreat-terrace-sunset.jpg
