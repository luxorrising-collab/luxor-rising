howItWorksEyebrow: How it works
howItWorksTitle: You choose a date. We arrange everything.
howItWorksSteps:
  - title: Reserve in a minute
    description: Pick your date, who's coming, and the hour. Pay securely online.
  - title: Your consigliere takes over
    description: >-
      Private return transfer, entry and perfect timing before the crowds,
      and a certified Egyptologist on site — every detail handled, and
      your consigliere with you from start to finish.
  - title: You just enjoy the flow
    description: >-
      Nothing to organise, decide or carry. You arrive — and three
      thousand years unfold around you.
disclosureText: >-
  Luxor Rising is your private concierge & advisor. We arrange and
  coordinate; guiding and transfers are delivered by our licensed local
  partners and a certified Egyptologist on site. This is a single daytime
  experience with no overnight stay.
guaranteeEyebrow: Our promise
guaranteeTitle: Reserved with confidence — or we make it right.
guaranteeItems:
  - title: Cancel freely
    description: >-
      Plans change. Cancel up to 7 days before for a full refund, no fine
      print.
  - title: Pay your way
    description: >-
      Settle in full, or place a deposit and pay the rest on the day.
      Your spot is held either way.
  - title: We make it right
    description: >-
      If anything we promised isn't delivered, you don't pay for it — and
      your consigliere fixes it on the spot.
testimonialsEyebrow: From recent guests
testimonialsTitle: The temple they didn't expect to love most.
testimonials:
  - quote: >-
      We almost skipped it. It became the highlight of Luxor — empty,
      glowing, and our guide made the carvings come alive.
    author: Lena & Tomáš, Vienna
  - quote: >-
      Standing on the oldest sacred ground in Thebes, at dawn, with no one
      else there. I won't forget it.
    author: Marcus, London
  - quote: >-
      Everything was arranged — car, tickets, a brilliant Egyptologist. We
      just showed up and were amazed.
    author: Sophie, Munich
